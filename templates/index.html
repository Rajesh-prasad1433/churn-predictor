<!DOCTYPE html>
<html>
<head>
    <title>PREDICTION</title>  
</head>
<body>
    <h1>Customer Churn Prediction</h1>
    <form id="churnForm">
        <label>Gender:</label>
        <select id ="gender">
            <option>Male</option>
            <option>Female</option>
        </select>
        <br><br>
        <label>Senior citizen:</label>
        <select id="SeniorCitizen">
            <option value = "1">YES</option>
            <option value = "0">NO</option>
        </select>
        <br><br>
        <label>Partner:</label>
        <select id ="Partner">
            <option>Yes</option>
            <option>No</option>
        </select>
        <br><br>
        <label>Dependents</label>
        <select id ="Dependents">
            <option>Yes</option>
            <option>No</option>

        </select>
        <br><br>
        <label>Tenure</label>
        <input type = "number" id ="Tenure"><br><br>
        <label>Phone service:</label>
        <select id ="PhoneService">
            <option>Yes</option>
            <option>No</option>

        </select>
        <label>Multiple Lines:</label>
        <select id ="MultipleLines">
            <option>Yes</option>
            <option>No</option>
            <option>No phone service</option>
        </select>
        <br><br>
        <label>Internet Service:</label>
        <select id ="InternetService">
            <option>DSL</option>
            <option>Fiber optic</option>
            <option>No</option>
        </select>
        <br><br>
        <label>Online security:</label>
        <select id ="OnlineSecurity">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
        <br><br>
        <label>Online Backup:</label>
        <select id ="OnlineBackup">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
        <br><br>
        <label>Device Protection:</label>
        <select id ="DeviceProtection">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
        <br><br>
        <label>Tech Support:</label>
        <select id ="TechSupport">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
        <br><br>
        <label>Streaming TV:</label>
        <select id ="StreamingTV">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
        <br><br>
        <label>Streaming Movies:</label>
        <select id ="StreamingMovies">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
        <br><br>
        <label>Contract:</label>
        <select id ="Contract">
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
        </select>
        <br><br>
        <label>Paper Billing:</label>
        <select id ="PaperBilling">
            <option>Yes</option>
            <option>No</option>
        </select>
        <br><br>
        <label>Payment Method:</label>
        <select id ="PaymentMethod">
            <option>Electronic check</option>
            <option>Mailed check</option>
            <option>Bank transfer (automatic)</option>
            <option>Credit card (automatic)</option>
        </select>
        <br><br>
        <label>Monthly Charges:</label>
        <input type="number" step = 0.01 id ="MonthlyCharges"><br><br>
        <label>Total Charges:</label>
        <input type="number" step = 0.01 id ="TotalCharges"><br><br>
        <button type="submit">Predict Churn</button>

    </form>
    <h2 id ="result"></h2>
    <script>
        document.getElementById("churnForm").addEventListener("submit", async(e)  => {
            e.preventDefault()
            const data = {
                gender : document.getElementById("gender").value,
                SeniorCitizen : parseInt(document.getElementById("SeniorCitizen").value),
                Partner : document.getElementById("Partner").value,
                Dependents : document.getElementById("Dependents").value,
                tenure : parseInt(document.getElementById("Tenure").value),
                PhoneService : document.getElementById("PhoneService").value,
                MultipleLines : document.getElementById("MultipleLines").value,
                InternetService : document.getElementById("InternetService").value,
                OnlineSecurity : document.getElementById("OnlineSecurity").value,
                OnlineBackup : document.getElementById("OnlineBackup").value,
                DeviceProtection : document.getElementById("DeviceProtection").value,
                TechSupport : document.getElementById("TechSupport").value,
                StreamingTV : document.getElementById("StreamingTV").value,
                StreamingMovies : document.getElementById("StreamingMovies").value,
                Contract : document.getElementById("Contract").value,
                PaperlessBilling : document.getElementById("PaperBilling").value,
                PaymentMethod : document.getElementById("PaymentMethod").value,
                MonthlyCharges : parseFloat(document.getElementById("MonthlyCharges").value),
                TotalCharges : parseFloat(document.getElementById("TotalCharges").value)

                
            };
            try {
                const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText);
            }
            const result = await response.json();
            document.getElementById("result").innerText = "Prediction: " + result["Churn prediction"];
            } catch (err) {
                document.getElementById("result").innerText = "Error: " + err.message;
                console.error(err);
            }            
            const response = await fetch("/predict", {
                method : "POST",
                headers : {
                    "Content-Type" : "application/json"
                },
                body : JSON.stringify(data)
            });
            const result = await response.json();
            document.getElementById("result").innerText = "Prediction: " + result["Churn prediction"];

        
        });
    </script>
    
</body>
</html>
